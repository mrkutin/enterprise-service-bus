version: "3.3"

services:
  redis:
    image: redis/redis-stack
    restart: on-failure
    ports:
      - 6379:6379
      - 8001:8001
    environment:
      REDIS_ARGS: --save 60 1 --notify-keyspace-events KEA
    volumes:
      - ./data/redis/:/data
    networks:
      - default

  mongo:
    image: mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
      MONGO_INITDB_DATABASE: state_dev
    ports:
      - 27018:27017
    volumes:
      - ./data/mongodb/cfg_data:/bitnami
    networks:
      - default
